spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: dracolich-mtg-deck-builder-api
  webflux:
    base-path: dracolich/mtg-deck-builder/api/v0/
  mongodb:
    database: ${MONGODB_DATABASE}
    uri: ${MONGODB_URI}
    representation:
      uuid: standard

server:
  port: ${PORT:8080}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

dracolich:
  cookie:
    secret: ${ANON_COOKIE_SECRET}
    lifetime: PT24H
    secure: false
  jwt:
    public-key: ${DRACOLICH_JWT_PUBLIC_KEY:classpath:keys/ec-public.pem}